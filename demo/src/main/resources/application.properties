spring.application.name=summer-bag-backend

# DataSource (PostgreSQL / AWS RDS). 로컬 기본값 제공, 환경변수로 override.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:summerbag}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# 스키마는 Flyway(db/migration)가 관리. Hibernate는 검증만 하고 절대 auto-DDL 하지 않음.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

# 앱인토스 연동용 (AuthService에서 사용). 지금은 스텁이라 미사용.
toss.client-id=${TOSS_CLIENT_ID:dummy}
toss.client-secret=${TOSS_CLIENT_SECRET:dummy}

# OpenWeatherMap 연동
openweather.api-key=${OPENWEATHER_API_KEY:dummy}
