spring.application.name=summer-bag-backend

# DataSource (PostgreSQL / AWS RDS). 로컬 기본값 제공, 환경변수로 override.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:summerbag}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# 스키마는 Flyway(db/migration)가 관리. Hibernate는 검증만 하고 절대 auto-DDL 하지 않음.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

# 인증 구현 선택: stub(기본, 개발/테스트용) | toss(실제 토스 검증 + JWT).
# 값만 toss 로 바꾸면 활성 AuthService 빈이 StubAuthService → TossAuthService 로 교체된다.
auth.mode=${AUTH_MODE:stub}

# 앱인토스 연동용 (TossAuthService/TossApiClient 에서 사용). stub 모드에선 미사용.
toss.base-url=${TOSS_BASE_URL:https://apps-in-toss-api.toss.im}
toss.generate-token-path=${TOSS_GENERATE_TOKEN_PATH:/api-partner/v1/apps-in-toss/user/oauth2/generate-token}
toss.login-me-path=${TOSS_LOGIN_ME_PATH:/api-partner/v1/apps-in-toss/user/oauth2/login-me}

# 파트너 서버 → 앱인토스 서버 구간은 mTLS 필수. PKCS12(.p12) 경로를 넣는다(예: file:/etc/toss/client.p12).
# 비워두면 기본 SSL 로 뜨고 실제 토스 호출은 실패한다(로컬/테스트 전용).
toss.mtls.key-store=${TOSS_MTLS_KEY_STORE:}
toss.mtls.key-store-password=${TOSS_MTLS_KEY_STORE_PASSWORD:}
toss.mtls.trust-store=${TOSS_MTLS_TRUST_STORE:}
toss.mtls.trust-store-password=${TOSS_MTLS_TRUST_STORE_PASSWORD:}

# 자체 JWT 발급/검증용. secret 은 반드시 32바이트 이상. 운영에선 환경변수로 주입할 것.
jwt.secret=${JWT_SECRET:dev-only-insecure-secret-please-change-me-32bytes+}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:2592000}

# OpenWeatherMap 연동
openweather.api-key=${OPENWEATHER_API_KEY:dummy}
